# Yerel: secret değerler .env içinde; bu dosyada sadece yollar/alias.
# Tümleştirme: ana projedeki 001+ SQL sonra 002, 003, 004 (sıra önemli).
services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-insaat_erp}
    ports:
      - "5432:5432"
    volumes:
      - insaat_erp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-insaat_erp}"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./insaat-erp-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  insaat_erp_pg: {}
