# Vakıfbank kart: Netlify → Site settings → Environment variables
#   VAKIF_INIT=test veya prod
#   VAKIF_HOST_MERCHANT_ID, VAKIF_MERCHANT_PASSWORD, VAKIF_HOST_TERMINAL_ID
#   SITE_URL=https://finskor.tr  (callback: /kart-odeme-sonuc.html)

[build]
  command   = "npm install && node build.js"
  publish   = "dist"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  node_bundler = "esbuild"

# MPI: enroll senkron uç varsayılan kapalı; asıl akış vakifbank-mpi-enroll-worker-background + vakifbank-mpi-enroll-status.
# Arka plan işi banka ~55s + soğuk başlangıç — açık süre; aksi hâlde iş yarım kalıp poll 95s dolunca boşa düşer.
[functions."vakifbank-mpi-enroll-worker-background"]
  timeout = 900

[functions."vakifbank-mpi-enroll"]
  timeout = 26

[functions."vakifbank-mpi-term"]
  timeout = 26

[functions."vakifbank-mpi-enroll-status"]
  timeout = 10

# Tam tarama (?full=1) uzun sürebilir; varsayılan prob kısa
[functions."vakif-connectivity-probe"]
  timeout = 60

[functions."vakif-ping"]
  timeout = 10

# ip-egress: ipify + ifconfig yedek; üst üste ~2× timeout
[functions."ip-egress"]
  timeout = 26

[functions."destek-bilgi"]
  timeout = 26

# Baykuş LLM (lokal/deneme): OPENAI_API_KEY veya FINSKOR_OPENAI_KEY; opsiyonel FINSKOR_AVATAR_MODEL
[functions."avatar-chat"]
  timeout = 45

# Baykuş geri bildirimi → baykus_events (Supabase migrasyonu + SERVICE_KEY önerilir)
[functions."avatar-feedback"]
  timeout = 15

# Baykuş bilgi bankası — FINSKOR_AVATAR_KB=1 + baykus_faq_entries (Supabase)
[functions."avatar-kb"]
  timeout = 12

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Tarayıcı varsayılan GET /favicon.ico — dosya yoksa 404; SVG ikona yönlendir
[[redirects]]
  from = "/kgf-rehber.html"
  to = "/kgf.html"
  status = 301
  force = true

[[redirects]]
  from = "/ticari-kredi.html"
  to = "/index.html"
  status = 301
  force = true

# Gizli: çek yükleme ve ticari faiz araç sayfaları — ana sayfa
[[redirects]]
  from = "/cek-yukle.html"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/en-uygun-ticari-faiz.html"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/cek-yukle-basarili.html"
  to = "/index.html"
  status = 301
  force = true

# Eski kredi notu analiz alt sayfası → ana sayfa
[[redirects]]
  from = "/platform.html"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200
  force = true

# Ödeme sayfası — CDN/tarayıcı eski HTML göstermesin (kart alanları güncellenince sorun çıkmasın)
[[headers]]
  for = "/odeme.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# /admin.html doğrudan erişimi engelle — 404 döner
[[redirects]]
  from = "/admin.html"
  to = "/404"
  status = 404
  force = true

# Gizli admin erişim yolu → gerçek admin.html
[[redirects]]
  from = "/yonetim-fs9k2x"
  to = "/admin.html"
  status = 200
  force = true
