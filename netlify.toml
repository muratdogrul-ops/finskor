# Vakıfbank kart: Netlify → Site settings → Environment variables
#   VAKIF_INIT=test veya prod
#   VAKIF_HOST_MERCHANT_ID, VAKIF_MERCHANT_PASSWORD, VAKIF_HOST_TERMINAL_ID
#   SITE_URL=https://finskor.tr  (callback: /kart-odeme-sonuc.html)

[build]
  command   = "npm install && node build.js"
  publish   = "dist"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# /admin.html doğrudan erişimi engelle — 404 döner
[[redirects]]
  from = "/admin.html"
  to = "/404"
  status = 404
  force = true

# Gizli admin erişim yolu → gerçek admin.html
[[redirects]]
  from = "/yonetim-fs9k2x"
  to = "/admin.html"
  status = 200
  force = true
